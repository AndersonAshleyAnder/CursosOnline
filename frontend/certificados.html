<main>
  <div class="wrap">

    <h1>Mis Certificados</h1>

    <p>En esta sección solo verás los certificados del usuario autenticado.</p>

    <table>
      <thead>
        <tr>
          <th>Estudiante</th>
          <th>Curso</th>
          <th>Código</th>
          <th>Fecha</th>
        </tr>
      </thead>
      <tbody id="tabla-certificados">
        <tr><td colspan="4">Cargando...</td></tr>
      </tbody>
    </table>

  </div>
</main>


<script src="app.js"></script>

<script>
document.addEventListener("DOMContentLoaded", async () => {
  if (typeof requireLogin === "function") requireLogin();
  if (typeof aplicarMenuPorRol === "function") aplicarMenuPorRol();

  await cargarCertificadosDelLogueado();
});

async function cargarCertificadosDelLogueado() {
  const tabla = document.getElementById("tabla-certificados");
  tabla.innerHTML = `<tr><td colspan="4">Cargando...</td></tr>`;

  try {
    const res = await authFetch(`${API_URL}/api/certificados/me`);
    const data = await res.json();

    if (!Array.isArray(data) || data.length === 0) {
      tabla.innerHTML = `<tr><td colspan="4">No tienes certificados aún.</td></tr>`;
      return;
    }

    tabla.innerHTML = "";

    data.forEach(c => {
      const estudiante =
  c.nombreEstudiante ||
  c.estudiante?.[0]?.nombre ||
  "—";

const curso =
  c.nombreCurso ||
  c.curso?.[0]?.nombre ||
  "—";

const codigo =
  c.codigo ||
  c.codigoCertificado ||
  "—";
      const fecha = c.fechaEmision
        ? new Date(c.fechaEmision).toLocaleDateString()
        : "—";

      tabla.innerHTML += `
        <tr>
          <td>${estudiante}</td>
          <td>${curso}</td>
          <td>${codigo}</td>
          <td>${fecha}</td>
        </tr>
      `;
    });

  } catch (e) {
    tabla.innerHTML = `<tr><td colspan="4">No se pudieron cargar los certificados: ${e.message}</td></tr>`;
  }
}
</script>


<script>
async function generarCertificado(cursoId) {
  const res = await authFetch("/api/certificados/generar", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ cursoId })
  });

  if (!res.ok) {
    alert("No se pudo generar el certificado");
    return;
  }

  const blob = await res.blob();
  const url = window.URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "certificado.pdf";
  a.click();
}
</script>
