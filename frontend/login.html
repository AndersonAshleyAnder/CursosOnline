<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- ✅ Nav con el mismo estilo del resto -->
  <nav class="nav-container">
    <div class="nav-left">
      <a href="index.html">Inicio</a>
    </div>
  </nav>

  <div class="auth-page">
    <div class="auth-card">
      <h1>Iniciar sesión</h1>

      <p>
        ¿No tienes cuenta?
        <!-- ✅ usa la clase que ya tienes en style.css -->
        <a class="mini-link" href="register.html">Regístrate aquí</a>.
      </p>

      <form id="login-form" method="POST" onsubmit="return false;">
        <div class="field">
          <label for="email"><strong>Email:</strong></label>
          <input
            id="email"
            type="email"
            placeholder="tu_correo@ejemplo.com"
            autocomplete="username"
            required
          >
        </div>

        <div class="field">
          <label for="password"><strong>Password:</strong></label>
          <input
            id="password"
            type="password"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          >
        </div>

        <div class="actions">
          <button id="btn-login" type="submit">Entrar</button>
          <span id="msg" class="msg"></span>
        </div>
      </form>
    </div>
  </div>

  <script>
    const API_URL = "https://cursosonline-9def.onrender.com";

    document.getElementById("login-form").onsubmit = async function(e) {
      e.preventDefault();
      return await login();
    };

    document.addEventListener("DOMContentLoaded", () => {
      const email = document.getElementById("email");
      if (email) email.focus();
    });

    async function login() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const msg = document.getElementById("msg");
      msg.textContent = "Validando...";

      try {
        const res = await fetch(`${API_URL}/api/auth/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Error de login");

        localStorage.setItem("token", data.token);
        localStorage.setItem("rol", data.rol || "");
        localStorage.setItem("estudianteId", data.estudianteId || "");

        const pendingCourseId = localStorage.getItem("pendingCourseId");
        if (pendingCourseId && data.rol === "estudiante") {
          await fetch(`${API_URL}/api/progreso`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "Authorization": "Bearer " + data.token
            },
            body: JSON.stringify({ cursoId: pendingCourseId })
          });
          localStorage.removeItem("pendingCourseId");
        }

        msg.textContent = "✅ OK";

        const params = new URLSearchParams(window.location.search);
        const redirect = params.get("redirect") || "index.html";
        window.location.href = redirect;

      } catch (e) {
        msg.textContent = "❌ " + e.message;
      }
    }
  </script>

</body>
</html>
