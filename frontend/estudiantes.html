<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión de Estudiantes</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="nav-container">
  <div class="nav-left">
    <a href="index.html">Inicio</a>
  </div>

  <button class="menu-toggle" onclick="toggleMenu()">☰</button>

  <div class="nav-menu" id="menu">
    <div class="nav-links">
      <a href="mis-cursos.html" id="link-mis">Mis Cursos</a>
      <a href="certificados.html" id="link-cert">Certificados</a>
      <a href="estudiantes.html" id="link-est">Estudiantes</a>
      <a href="consultas.html" id="link-con">Consultas</a>
      <a href="dashboard-admin.html" id="link-dashboard">Dashboard</a>
    </div>

    <div class="nav-auth">
      <a href="login.html" id="link-login">Iniciar sesión</a>
      <a href="register.html" id="link-register">Registrarse</a>
      <a href="#" id="link-logout">Cerrar sesión</a>
    </div>
  </div>
</nav>

<main class="layout">

  <h1>Gestión de Estudiantes (Admin)</h1>
  <p>Solo el administrador puede acceder a esta sección.</p>

  <p id="total" style="font-weight:700;"></p>

  <!-- BUSCAR -->
  <div style="display:flex; gap:12px; max-width:640px; margin:20px 0;">
    <input id="buscar" placeholder="Buscar por nombre, apellido o email" style="flex:1;">
    <button id="btn-buscar">Buscar</button>
    <button id="btn-export">Exportar CSV</button>
  </div>
  <!-- BUSCAR + FILTRO POR FECHA -->
<div style="display:flex; gap:12px; flex-wrap:wrap; max-width:800px; margin:20px 0;">
  <input id="buscar" placeholder="Buscar por nombre, apellido o email" style="flex:1;">

  <input type="date" id="fechaInicio">
  <input type="date" id="fechaFin">

  <button id="btn-buscar">Filtrar</button>
  <button id="btn-export">Exportar CSV</button>
</div>

  <!-- CREAR -->
  <h2>Crear estudiante</h2>
  <div style="display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:12px; max-width:820px; margin-bottom:24px;">
    <input id="nombre" placeholder="Nombre">
    <input id="apellido" placeholder="Apellido">
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Contraseña">
    <button id="btn-crear">Crear</button>
  </div>

  <!-- TABLA -->
  <h2>Listado</h2>
  <div class="section-card">
  <div class="table-wrap">
    <table>
    <thead>
      <tr>
        <th>Nombre</th>
        <th>Email</th>
        <th style="text-align:right;">Acciones</th>
      </tr>
    </thead>
    <tbody id="tabla"></tbody>
 </table>
  </div>
</div>

  <!-- PAGINACIÓN NUMÉRICA (MISMO LOOK QUE CATÁLOGO) -->
  <div class="paginacion-wrapper" style="margin-top:16px;">
    <button id="btn-prev-local">Anterior</button>

    <!-- 👇 usa los estilos del CSS global (#paginacion) -->
    <div id="paginacion"></div>

    <button id="btn-next-local">Siguiente</button>
  </div>

  <p id="info-pagina" style="text-align:center;"></p>

</main>

<!-- MODAL EDITAR -->
<div id="modal"
     style="display:none; position:fixed; inset:0;
            background:rgba(0,0,0,.6);
            align-items:center; justify-content:center;
            z-index:9999;">
  <div style="background:#111a33; padding:20px; border-radius:14px; width:340px;">
    <h3>Editar estudiante</h3>

    <input id="m-nombre" placeholder="Nombre" style="margin-top:10px;">
    <input id="m-apellido" placeholder="Apellido" style="margin-top:10px;">
    <input id="m-email" placeholder="Email" style="margin-top:10px;">

    <div style="display:flex; gap:10px; margin-top:16px;">
      <button id="btn-guardar">Guardar</button>
      <button id="btn-cancelar">Cancelar</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"
     style="position:fixed; bottom:24px; right:24px;
            background:#111a33; color:#fff;
            padding:12px 16px; border-radius:12px;
            box-shadow:0 10px 30px rgba(0,0,0,.35);
            display:none; z-index:9999;">
</div>

<!-- LOADER -->
<div id="loader">
  <div class="loader-box">Procesando…</div>
</div>

<script src="app.js"></script>

<script>
let usuarios = [];
let page = 1;
const limit = 5;
let editId = null;

/* UX */
function showToast(msg, ok=true){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.background = ok ? "#22c55e" : "#ef4444";
  t.style.display = "block";
  setTimeout(()=>t.style.display="none",2500);
}
function showLoader(v){
  document.getElementById("loader").style.display = v ? "block" : "none";
}

/* =========================
   DATA: CARGAR (usa /api/admin/usuarios)
   ========================= */
async function cargar(){
  try{
    showLoader(true);

    const q = document.getElementById("buscar").value || "";
    const fechaInicio = document.getElementById("fechaInicio").value;
    const fechaFin = document.getElementById("fechaFin").value;

    const params = new URLSearchParams({
      q,
      fechaInicio,
      fechaFin
    });

    const res = await authFetch(`${API_URL}/api/estudiantes?${params}`);
    const json = await res.json();

    usuarios = json.data || [];

    document.getElementById("total").textContent =
      `Total estudiantes: ${json.total}`;

    page = 1;

    render();
    renderPaginacionNumerica();

  }catch(e){
    showToast(e.message,false);
  }finally{
    showLoader(false);
  }
}
  }catch(e){
    showToast(e.message,false);
  }finally{
    showLoader(false);
  }
}

/* =========================
   RENDER TABLA (slice por página)
   ========================= */
function render(){
  const tbody = document.getElementById("tabla");
  tbody.innerHTML = "";

  const ini = (page - 1) * limit;
  const fin = ini + limit;

  usuarios.slice(ini, fin).forEach(u=>{
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${u.nombre||""} ${u.apellido||""}</td>
      <td>${u.email||""}</td>
      <td style="text-align:right;">
        <button onclick="editar('${u._id}')">✏️</button>
        <button onclick="resetPass('${u._id}')">🔑</button>
        <button onclick="eliminar('${u._id}')">🗑</button>
      </td>`;
    tbody.appendChild(tr);
  });

  const totalPages = Math.max(Math.ceil(usuarios.length / limit), 1);
  document.getElementById("info-pagina").textContent = `Página ${page} de ${totalPages}`;
}

/* =========================
   PAGINACIÓN NUMÉRICA (igual al catálogo)
   ========================= */
function renderPaginacionNumerica(){
  const cont = document.getElementById("paginacion");
  const btnPrev = document.getElementById("btn-prev-local");
  const btnNext = document.getElementById("btn-next-local");

  const totalPages = Math.max(Math.ceil(usuarios.length / limit), 1);

  // prev/next
  btnPrev.disabled = page <= 1;
  btnNext.disabled = page >= totalPages;

  btnPrev.onclick = () => { if(page>1){ page--; render(); renderPaginacionNumerica(); } };
  btnNext.onclick = () => { if(page<totalPages){ page++; render(); renderPaginacionNumerica(); } };

  // si solo 1 página, no mostrar números
  if (totalPages <= 1){
    cont.innerHTML = "";
    return;
  }

  cont.innerHTML = "";

  const maxBotones = 7;
  let inicio = Math.max(page - 3, 1);
  let fin = Math.min(inicio + maxBotones - 1, totalPages);
  inicio = Math.max(fin - maxBotones + 1, 1);

  const btnPag = (p, activo) => {
    const b = document.createElement("button");
    b.textContent = String(p);
    b.className = activo ? "activo" : "";
    b.disabled = activo;
    b.onclick = () => { page = p; render(); renderPaginacionNumerica(); };
    return b;
  };

  const puntos = () => {
    const s = document.createElement("span");
    s.textContent = "...";
    s.style.padding = "0 6px";
    return s;
  };

  if (inicio > 1){
    cont.appendChild(btnPag(1, page === 1));
    if (inicio > 2) cont.appendChild(puntos());
  }

  for (let p = inicio; p <= fin; p++){
    cont.appendChild(btnPag(p, p === page));
  }

  if (fin < totalPages){
    if (fin < totalPages - 1) cont.appendChild(puntos());
    cont.appendChild(btnPag(totalPages, page === totalPages));
  }
}

/* =========================
   ACTIONS (CRUD)
   ========================= */
async function crear(){
  try{
    showLoader(true);
    await authFetch(`${API_URL}/api/admin/usuarios`, {
      method:"POST",
      body: JSON.stringify({
        nombre: document.getElementById("nombre").value,
        apellido: document.getElementById("apellido").value,
        email: document.getElementById("email").value,
        password: document.getElementById("password").value
      })
    });

    document.getElementById("nombre").value = "";
    document.getElementById("apellido").value = "";
    document.getElementById("email").value = "";
    document.getElementById("password").value = "";

    showToast("✅ Estudiante creado");
    await cargar();
  }catch(e){
    showToast(e.message,false);
  }finally{
    showLoader(false);
  }
}

function editar(id){
  const u = usuarios.find(x => x._id === id);
  editId = id;

  document.getElementById("m-nombre").value = u?.nombre || "";
  document.getElementById("m-apellido").value = u?.apellido || "";
  document.getElementById("m-email").value = u?.email || "";

  document.getElementById("modal").style.display="flex";
}

async function guardarEdicion(){
  try{
    showLoader(true);
    await authFetch(`${API_URL}/api/admin/usuarios/${editId}`, {
      method:"PUT",
      body: JSON.stringify({
        nombre: document.getElementById("m-nombre").value,
        apellido: document.getElementById("m-apellido").value,
        email: document.getElementById("m-email").value
      })
    });

    cerrarModal();
    showToast("✅ Usuario actualizado");
    await cargar();
  }catch(e){
    showToast(e.message,false);
  }finally{
    showLoader(false);
  }
}

function cerrarModal(){
  document.getElementById("modal").style.display="none";
}

async function eliminar(id){
  if(!confirm("¿Eliminar este usuario?")) return;
  try{
    showLoader(true);
    await authFetch(`${API_URL}/api/admin/usuarios/${id}`, { method:"DELETE" });
    showToast("🗑 Usuario eliminado");
    await cargar();
  }catch(e){
    showToast(e.message,false);
  }finally{
    showLoader(false);
  }
}

async function resetPass(id){
  const pass = prompt("Nueva contraseña:");
  if(!pass) return;
  try{
    showLoader(true);
    await authFetch(`${API_URL}/api/admin/usuarios/${id}/reset-password`, {
      method:"PUT",
      body: JSON.stringify({ password: pass })
    });
    showToast("🔑 Contraseña actualizada");
  }catch(e){
    showToast(e.message,false);
  }finally{
    showLoader(false);
  }
}

/* CSV */
function exportarCSV(){
  const rows = [["Nombre","Apellido","Email"]];
  usuarios.forEach(u => rows.push([u.nombre||"", u.apellido||"", u.email||""]));
  const csv = rows.map(r => r.join(",")).join("\n");

  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([csv], { type:"text/csv" }));
  a.download = "estudiantes.csv";
  a.click();
}

/* Eventos UI */
document.getElementById("btn-buscar").onclick = cargar;
document.getElementById("btn-export").onclick = exportarCSV;
document.getElementById("btn-crear").onclick = crear;
document.getElementById("btn-guardar").onclick = guardarEdicion;
document.getElementById("btn-cancelar").onclick = cerrarModal;

// carga inicial
cargar();
</script>

</body>
</html>
