      <div class="nav-auth">

  <div class="auth-page">
    <div class="auth-card">
      <h1>Crear cuenta</h1>
      <p>¿Ya tienes cuenta? <a class="mini-link" hrefa>.</p>

      <form id="register-form" method="POST" onsubmit="return false;">
        <div class="field">
          <label><strong>Nombre:</strong></label>
          <input id="nombre" type="text" required>
        </div>

        <div class="field">
          <label><strong>Email:</strong></label>
          <input id="email" type="email" autocomplete="username" required>
        </div>

        <div class="field">
          <label><strong>Contraseña:</strong></label>
          <input id="password" type="password" autocomplete="new-password" required>
        </div>

        <div class="field">
          <label><strong>Confirmar contraseña:</strong></label>
          <input id="password2" type="password" autocomplete="new-password" required>
        </div>

        <div class="actions">
          <button id="btn-register" type="submit">Registrarme</button>
          <span id="msg" class="msg"></span>
        </div>
      </form>
    </div>
  </div>

  <!-- ✅ app.js UNA sola vez -->
  <script src="app.js<script>
    document.getElementById("register-form").onsubmit = async function(e){
      e.preventDefault();
      await register();
      return false;
    };

    async function register() {
      const nombre = document.getElementById("nombre").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const password2 = document.getElementById("password2").value.trim();
      const msg = document.getElementById("msg");

      if (!nombre || !email || !password) {
        msg.textContent = "❌ Completa todos los campos";
        return;
      }
      if (password.length < 6) {
        msg.textContent = "❌ Password mínimo 6 caracteres";
        return;
      }
      if (password !== password2) {
        msg.textContent = "❌ Las contraseñas no coinciden";
        return;
      }

      msg.textContent = "⏳ Registrando...";

      try {
        const res = await fetch(`${API_URL}/api/auth/register`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ nombre, email, password })
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Error registrando usuario");

        msg.textContent = "✅ Registro exitoso";
        setTimeout(() => window.location.href = "login.html", 900);

      } catch (err) {
        msg.textContent = "❌ " + err.message;
      }
    }
  </script>

</body>
</html>
