<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="nav-container">
  <div class="nav-left">
    <a href="index.html">Inicio</a>
  </div>
  <div class="nav-right">
    <a href="login.html" class="mini-link">Iniciar sesión</a>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <h1>Crear cuenta</h1>
    <p>¿Ya tienes cuenta? <a class="mini-link" href="login.html">Inicia sesión</a>.</p>

    <div class="field">
      <label><strong>Nombre:</strong></label>
      <input id="nombre" type="text">
    </div>

    <div class="field">
      <label><strong>Email:</strong></label>
      <input id="email" type="email">
    </div>

    <div class="field">
      <label><strong>Password:</strong></label>
      <input id="password" type="password">
    </div>

    <div class="field">
      <label><strong>Confirmar password:</strong></label>
      <input id="password2" type="password">
    </div>

    <div class="actions">
      <button id="btn-register">Registrarme</button>
      <span id="msg" class="msg"></span>
    </div>

  </div>
</div>

<script>
const API_URL = "https://cursosonline-9def.onrender.com";

document.getElementById("btn-register")
  .addEventListener("click", register);

async function register() {

  const nombre = document.getElementById("nombre").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const password2 = document.getElementById("password2").value.trim();
  const msg = document.getElementById("msg");

  // ✅ Validaciones
  if (!nombre || !email || !password) {
    msg.textContent = "❌ Completa todos los campos";
    return;
  }

  if (password.length < 6) {
    msg.textContent = "❌ Password mínimo 6 caracteres";
    return;
  }

  if (password !== password2) {
    msg.textContent = "❌ Las contraseñas no coinciden";
    return;
  }

  msg.textContent = "⏳ Registrando...";

  try {

    const res = await fetch(`${API_URL}/api/auth/register`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ nombre, email, password })
    });

    const data = await res.json();

    if (!res.ok) {
      throw new Error(data.error || "Error registrando usuario");
    }

    msg.textContent = "✅ Registro exitoso";

    setTimeout(() => {
      window.location.href = "login.html";
    }, 1000);

  } catch (err) {
    msg.textContent = "❌ " + err.message;
  }
}
</script>

</body>
</html>
