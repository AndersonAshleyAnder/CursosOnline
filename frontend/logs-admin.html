<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auditoría Administrativa</title>
  <link rel="stylesheet" href="style.css">

  <style>
    .paginacion {
      display:flex;
      justify-content:center;
      gap:10px;
      margin-top:20px;
      flex-wrap:wrap;
    }

    .paginacion-numeros{
      display:flex;
      gap:8px;
    }

    .paginacion button{
      min-width:38px;
      padding:6px 10px;
      border:none;
      border-radius:10px;
      background:#7c3aed;
      color:#fff;
      cursor:pointer;
      font-weight:bold;
    }

    .paginacion button.activo{
      background:#c084fc;
      cursor:default;
    }

    .info{
      text-align:center;
      margin-top:8px;
    }
  </style>
</head>

<body>

<nav class="nav-container">
  <div class="nav-left">
    <a href="index.html">Inicio</a>
  </div>
  <button class="menu-toggle" onclick="toggleMenu()">☰</button>
</nav>

<main class="layout">

  <h1>Auditoría Administrativa</h1>

  <div class="section-card">

    <div style="display:flex; gap:12px; margin:20px 0;">
      <input id="buscar" placeholder="Filtrar..." style="flex:1;">
      <button id="btnBuscar">Buscar</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>Acción</th>
          <th>Usuario</th>
          <th>Fecha</th>
        </tr>
      </thead>
      <tbody id="tabla"></tbody>
    </table>

    <div class="paginacion">
      <button id="prev">Anterior</button>
      <div id="numeros" class="paginacion-numeros"></div>
      <button id="next">Siguiente</button>
    </div>

    <div id="info" class="info"></div>

  </div>

</main>

<script src="app.js"></script>

<script>
let logs = [];
let filtrados = [];
let page = 1;
const limit = 5;

async function cargar(){

  try{
    const res = await authFetch(`${API_URL}/api/admin/logs?limit=200`);

    if(!res.ok){
      throw new Error("No autorizado o error en logs");
    }

    logs = await res.json();

    if(!Array.isArray(logs)){
      console.error("La respuesta no es un array:", logs);
      logs = [];
    }

  }catch(err){
    console.error(err);
    logs = [];
  }

  aplicarFiltro();
}

function aplicarFiltro(){
  const q = (document.getElementById("buscar").value || "").toLowerCase();

  filtrados = logs.filter(x =>
    (x.accion || "").toLowerCase().includes(q) ||
    (x.usuarioId || "").toLowerCase().includes(q)
  );

  page = 1;
  render();
}

function render(){
  const tabla = document.getElementById("tabla");
  tabla.innerHTML = "";

  const inicio = (page-1)*limit;

  filtrados.slice(inicio, inicio + limit).forEach(l => {
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${l.accion}</td>
      <td>${l.usuarioId}</td>
      <td>${l.fecha ? new Date(l.fecha).toLocaleString() : ""}</td>
    `;

    tabla.appendChild(tr);
  });

  renderPaginacion();
}

function renderPaginacion(){
  const totalPages = Math.ceil(filtrados.length / limit) || 1;
  const cont = document.getElementById("numeros");
  cont.innerHTML = "";

  document.getElementById("info").textContent =
    `Página ${page} de ${totalPages}`;

  prev.disabled = page === 1;
  next.disabled = page === totalPages;

  const max = 7;
  let start = Math.max(1, page-3);
  let end = Math.min(totalPages, start + max - 1);

  const crear = (p)=>{
    const b = document.createElement("button");
    b.textContent = p;

    if(p===page){
      b.classList.add("activo");
      b.disabled = true;
    }

    b.onclick = ()=>{
      page = p;
      render();
    };

    return b;
  };

  for(let i = start; i <= end; i++){
    cont.appendChild(crear(i));
  }
}

prev.onclick = ()=>{
  if(page>1){
    page--;
    render();
  }
};

next.onclick = ()=>{
  if(page < Math.ceil(filtrados.length/limit)){
    page++;
    render();
  }
};

btnBuscar.onclick = aplicarFiltro;

cargar();
</script>

</body>
</html>
