<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auditoría Administrativa</title>
  <link rel="stylesheet" href="style.css">

  <style>
    .paginacion {
      display:flex;
      justify-content:center;
      align-items:center;
      gap:10px;
      margin-top:20px;
      flex-wrap:wrap;
    }

    .paginacion-numeros{
      display:flex;
      gap:8px;
    }

    .paginacion button{
      min-width:38px;
      padding:6px 10px;
      border-radius:10px;
      border:none;
      cursor:pointer;
      background: linear-gradient(135deg,#6d28d9,#9333ea);
      color:#fff;
      font-weight:bold;
    }

    .paginacion button.activo{
      background: linear-gradient(135deg,#a78bfa,#c084fc);
      cursor:default;
    }

    .info-pagina{
      text-align:center;
      margin-top:8px;
      opacity:.8;
      color:#fff;
    }
  </style>
</head>

<body>

<nav class="nav-container">
  <div class="nav-left">
    <a href="index.html">Inicio</a>
  </div>

  <button class="menu-toggle" onclick="toggleMenu()">☰</button>

  <div class="nav-menu" id="menu">
    <div class="nav-links">
      <a href="mis-cursos.html" id="link-mis">Mis Cursos</a>
      <a href="certificados.html" id="link-cert">Certificados</a>
      <a href="estudiantes.html" id="link-est">Estudiantes</a>
      <a href="consultas.html" id="link-con">Consultas</a>
      <a href="dashboard-admin.html" id="link-dashboard">Dashboard</a>
    </div>

    <div class="nav-auth">
      <a href="login.html" id="link-login">Iniciar sesión</a>
      <a href="register.html" id="link-register">Registrarse</a>
      <a href="#" id="link-logout">Cerrar sesión</a>
    </div>
  </div>
</nav>

<main class="layout">

  <h1>Auditoría Administrativa</h1>
  <p>Registro completo de acciones realizadas por el administrador.</p>

  <div class="section-card">

    <!-- BUSCAR -->
    <div style="display:flex; gap:12px; max-width:640px; margin:20px 0;">
      <input id="buscar" placeholder="Filtrar..." style="flex:1;">
      <button id="btn-buscar">Buscar</button>
    </div>

    <!-- TABLA -->
    <table>
      <thead>
        <tr>
          <th>Acción</th>
          <th>Usuario</th>
          <th>Fecha</th>
        </tr>
      </thead>
      <tbody id="tabla"></tbody>
    </table>

    <!-- PAGINACIÓN -->
    <div class="paginacion">
      <button id="prev">Anterior</button>
      <div id="numeros" class="paginacion-numeros"></div>
      <button id="next">Siguiente</button>
    </div>

    <div id="info" class="info-pagina"></div>

  </div>

</main>

<script src="app.js"></script>

<script>
let logs = [];
let filtrados = [];
let page = 1;
const limit = 5;

/* ✅ CARGAR DATOS */
async function cargarLogs(){
  const res = await fetch(`${API_URL}/api/admin/logs?limit=200`);
  logs = await res.json();

  aplicarFiltro();
}

/* ✅ FILTRO */
function aplicarFiltro(){
  const q = (document.getElementById("buscar").value || "").toLowerCase();

  filtrados = logs.filter(x =>
    (x.accion || "").toLowerCase().includes(q) ||
    (x.usuarioId || "").toLowerCase().includes(q)
  );

  page = 1;
  render();
}

/* ✅ RENDER TABLA */
function render(){
  const tabla = document.getElementById("tabla");
  tabla.innerHTML = "";

  const inicio = (page-1)*limit;
  const fin = inicio + limit;

  filtrados.slice(inicio, fin).forEach(l=>{
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${l.accion}</td>
      <td>${l.usuarioId}</td>
      <td>${l.fecha ? new Date(l.fecha).toLocaleString() : ""}</td>
    `;
    tabla.appendChild(tr);
  });

  renderPaginacion();
}

/* ✅ PAGINACIÓN NUMÉRICA */
function renderPaginacion(){
  const totalPages = Math.ceil(filtrados.length / limit) || 1;

  const cont = document.getElementById("numeros");
  cont.innerHTML = "";

  document.getElementById("info").textContent =
    `Página ${page} de ${totalPages}`;

  document.getElementById("prev").disabled = page===1;
  document.getElementById("next").disabled = page===totalPages;

  const max = 7;
  let start = Math.max(1, page-3);
  let end = Math.min(totalPages, start+max-1);
  start = Math.max(1, end-max+1);

  const crearBtn = (p) => {
    const b = document.createElement("button");
    b.textContent = p;

    if(p===page){
      b.classList.add("activo");
      b.disabled=true;
    }

    b.onclick = ()=>{
      page = p;
      render();
    };

    return b;
  };

  if(start>1){
    cont.appendChild(crearBtn(1));
    if(start>2){
      const dots = document.createElement("span");
      dots.textContent = "...";
      cont.appendChild(dots);
    }
  }

  for(let i=start;i<=end;i++){
    cont.appendChild(crearBtn(i));
  }

  if(end<totalPages){
    if(end<totalPages-1){
      const dots = document.createElement("span");
      dots.textContent = "...";
      cont.appendChild(dots);
    }
    cont.appendChild(crearBtn(totalPages));
  }
}

/* ✅ BOTONES */
document.getElementById("prev").onclick = ()=>{
  if(page>1){
    page--;
    render();
  }
};

document.getElementById("next").onclick = ()=>{
  if(page < Math.ceil(filtrados.length / limit)){
    page++;
    render();
  }
};

document.getElementById("btn-buscar").onclick = aplicarFiltro;

/* INIT */
cargarLogs();
</script>

</body>
</html>
